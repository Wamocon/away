# =============================================================================
# Workflow 5 – i18n Coverage Check
# =============================================================================
# Prüft bei jedem PR:
#   1. DE/EN Key-Parität in src/lib/i18n.ts — alle deutschen Übersetzungskeys
#      müssen eine englische Entsprechung haben.
#   2. Warnt bei bekannten hardcodierten deutschen Strings in .tsx-Dateien.
#
# Blockiert Merge bei Key-Paritätsfehler.
# =============================================================================

name: i18n Coverage Check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
    types: [opened, synchronize, reopened]

concurrency:
  group: i18n-check-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  i18n-check:
    name: i18n DE/EN Key Parity
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run i18n coverage check
        run: npx ts-node --compiler-options '{"module":"commonjs"}' src/scripts/check-i18n-coverage.ts

      - name: Annotate PR with missing keys
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ **i18n Check Failed**: Some DE translation keys are missing in EN.\n\nPlease update `src/lib/i18n.ts` to add the missing English translations.'
            })
