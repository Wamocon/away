# =============================================================================
# Workflow 2 – Validierung (TypeScript + ESLint)
# =============================================================================
# Läuft bei:
#   • Push auf main/master
#   • Jedem PR-Push gegen main/master
#
# Prüfte:
#   1. TypeScript-Typfehler (tsc --noEmit)
#   2. ESLint (src/**/*.{ts,tsx})
#
# Blockiert Merge bei Fehlern.
# =============================================================================

name: Validation

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
    types: [opened, synchronize, reopened]

concurrency:
  group: validation-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  typecheck:
    name: TypeScript Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript Typecheck
        run: npm run typecheck

  lint:
    name: ESLint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint
