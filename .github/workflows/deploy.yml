# =============================================================================
# Deploy – Production (push to main/master ODER GitHub Release)
# =============================================================================
# Triggered by:
#   push → main/master    → Production deploy (nach PR-Merge)
#   release → published   → Production deploy (per GitHub Release)
#
# Required Secrets (Repository Settings → Secrets → Actions):
#   VERCEL_TOKEN       – Vercel Personal Access Token (WMCNiko)
#   VERCEL_PROJECT_ID  – Project ID aus `.vercel/project.json`
#   VERCEL_ORG_ID      – Team/Personal Scope ID aus `.vercel/project.json`
# =============================================================================

name: Deploy Production

on:
  push:
    branches: [main, master]
  release:
    types: [published]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Vercel (Production)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment (production)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (production)
        id: deploy
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "deploy_url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "### Production Deployment" >> $GITHUB_STEP_SUMMARY
          echo "Trigger: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "URL: $DEPLOY_URL" >> $GITHUB_STEP_SUMMARY
