# =============================================================================
# Workflow 3 – Vercel Preview Deploy
# =============================================================================
# Läuft bei:
#   • Jedem PR-Push gegen main/master
#
# Secrets (Organisation):  VERCEL_TOKEN, VERCEL_ORG_ID
# Secrets (Repository):    VERCEL_PROJECT_ID
#
# Vercel Git Integration ist deaktiviert (vercel.json → github.enabled: false),
# daher übernimmt dieses Workflow den Preview-Deploy vollständig.
# =============================================================================

name: Vercel Preview Deploy

on:
  pull_request:
    branches: [main, master]
    types: [opened, synchronize, reopened]

concurrency:
  group: deploy-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check Vercel credentials
        id: creds
        env:
          TOKEN: ${{ secrets.VERCEL_TOKEN }}
          ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -n "$TOKEN" ] && [ -n "$ORG_ID" ] && [ -n "$PROJECT_ID" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Vercel credentials not configured – skipping preview deploy"
          fi

      - name: Checkout
        if: steps.creds.outputs.ready == 'true'
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: steps.creds.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Vercel CLI
        if: steps.creds.outputs.ready == 'true'
        run: npm install --global vercel@latest

      - name: Pull Vercel environment (preview)
        if: steps.creds.outputs.ready == 'true'
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project
        if: steps.creds.outputs.ready == 'true'
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (preview)
        if: steps.creds.outputs.ready == 'true'
        id: deploy
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          for attempt in 1 2 3 4 5; do
            echo "Deploy attempt $attempt of 5..."
            if vercel deploy --prebuilt --archive=tgz --token=${{ secrets.VERCEL_TOKEN }} > /tmp/vercel-deploy.txt 2>&1; then
              cat /tmp/vercel-deploy.txt
              URL=$(grep -E '^https://' /tmp/vercel-deploy.txt | tail -1)
              echo "url=$URL" >> "$GITHUB_OUTPUT"
              echo "Preview URL: $URL"
              break
            else
              cat /tmp/vercel-deploy.txt
              if [ "$attempt" = "5" ]; then
                echo "::error::Vercel deploy failed after 5 attempts"
                exit 1
              fi
              WAIT=$((attempt * 20))
              echo "Retrying in ${WAIT} seconds..."
              sleep $WAIT
            fi
          done

      - name: Comment PR with preview URL
        if: steps.creds.outputs.ready == 'true' && steps.deploy.outputs.url != ''
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.url }}';
            const sha  = context.payload.pull_request.head.sha.substring(0, 7);
            await github.rest.issues.createComment({
              owner:    context.repo.owner,
              repo:     context.repo.repo,
              issue_number: context.issue.number,
              body: `### Vercel Preview Deploy\n\n**URL:** ${url}\n**Commit:** \`${sha}\``
            });
