# =============================================================================
# PR Pipeline – Inlined (Auto-Fix + Validation)
# =============================================================================
# Inspired by the shared workflow templates from github_workflow.
# Inlined directly to avoid dependency on a private external repository.
#
# Step 1 (autofix): ESLint --fix + prettier, commits fixes back to PR branch.
# Step 2 (validate): TypeScript typecheck + ESLint + Vitest tests.
# =============================================================================

name: PR Pipeline

on:
  pull_request:
    branches: [main, master]
    types: [opened, synchronize, reopened]

# Cancel redundant runs on the same PR
concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # ─── Step 1: Auto-fix lint & format errors ───────────────────────────
  autofix:
    name: Auto-Fix Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Fix lint errors
        run: npm run lint -- --fix
        continue-on-error: true

      - name: Fix formatting
        run: npx prettier --write .
        continue-on-error: true

      - name: Commit auto-fixed changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: auto-fix lint and formatting issues"
          branch: ${{ github.head_ref }}

  # ─── Step 2: Validate code (typecheck + lint + tests) ─────────────────
  validate:
    name: Typecheck, Lint & Tests
    needs: autofix
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm run test
