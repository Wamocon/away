# =============================================================================
# PR Pipeline – Validation (Typecheck + Lint + Tests)
# =============================================================================
# Läuft bei jedem Push auf einen Pull Request gegen main/master.
#
# Aufbau:
#   Job 1 (validate): TypeScript, ESLint, Vitest – blockiert Merge bei Fehler
#
# Hinweis: Auto-Fix (prettier/eslint --fix) ist bewusst entfernt.
# Ein Auto-Commit-Job würde einen neuen synchronize-Event auslösen, der
# diesen Workflow per concurrency cancel-in-progress abbricht – Endlosschleife.
# Entwickler sollen Fehler lokal per `npm run lint` und `npx prettier` fixen.
# =============================================================================

name: PR Pipeline

on:
  pull_request:
    branches: [main, master]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

# Nur einen Run pro PR gleichzeitig – abbrechnen wenn neuer Push kommt
concurrency:
  group: pr-validate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    name: Typecheck, Lint & Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm run test
