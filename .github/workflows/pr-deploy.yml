# =============================================================================
# PR Preview Deployment (Vercel CLI)
# =============================================================================
# Deployt eine Preview-Version auf Vercel bei jedem Push in einen PR.
# Nutzt den Vercel CLI mit persönlichem VERCEL_TOKEN – funktioniert auch
# mit privaten Repos auf dem Hobby-Plan (kein GitHub Integration Bot nötig).
#
# Nach erfolgreichem Deploy wird die Preview-URL als PR-Kommentar gepostet.
#
# Required Secrets (Repository Settings → Secrets → Actions):
#   VERCEL_TOKEN       – Vercel Personal Access Token (WMCNiko)
#   VERCEL_PROJECT_ID  – Project ID aus `.vercel/project.json` oder Vercel Dashboard
#   VERCEL_ORG_ID      – Team/Personal Scope ID aus `.vercel/project.json`
# =============================================================================

name: PR Preview Deploy

on:
  pull_request:
    branches: [main, master]
    types: [opened, synchronize, reopened]

# Nur einen Preview-Deploy pro PR gleichzeitig
concurrency:
  group: pr-deploy-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    name: Deploy Preview to Vercel
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      pull-requests: write   # für PR-Kommentar mit Preview-URL

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment (preview)
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Preview to Vercel
        id: deploy
        run: |
          PREVIEW_URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "preview_url=$PREVIEW_URL" >> $GITHUB_OUTPUT
          echo "### Preview Deployment" >> $GITHUB_STEP_SUMMARY
          echo "URL: $PREVIEW_URL" >> $GITHUB_STEP_SUMMARY

      - name: Comment Preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl = '${{ steps.deploy.outputs.preview_url }}';
            const body = [
              '### Preview Deployment',
              '',
              `**URL:** ${previewUrl}`,
              '',
              `**Commit:** ${context.sha.substring(0, 7)}`,
              `**Branch:** \`${context.payload.pull_request.head.ref}\``,
            ].join('\n');

            // Alten Kommentar finden und aktualisieren (1 Kommentar pro PR)
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('Preview Deployment')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
